<style>
  :root {
    --bg-1: #0a0a0f;
    --bg-2: #12121a;
    --card: rgba(255, 255, 255, 0.04);
    --card-hover: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.10);
    --border-hover: rgba(255, 255, 255, 0.22);
    --text: #f5f5f7;
    --text-dim: #9a9aa6;
    --accent: #7c5cff;
    --accent-2: #00d4ff;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(124, 92, 255, 0.18), transparent 60%),
      radial-gradient(900px 500px at 100% 10%, rgba(0, 212, 255, 0.10), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    background-attachment: fixed;
    min-height: 100%;
    display: flex;
    justify-content: center;
    padding: 56px 20px 48px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* -------- Avatar -------- */
  .avatar {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 8px 40px rgba(124, 92, 255, 0.35);
    overflow: hidden;
    border: 2px solid rgba(255, 255, 255, 0.15);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* -------- Header -------- */
  .name {
    margin-top: 18px;
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .verified { width: 19px; height: 19px; color: var(--accent-2); }

  .handle { margin-top: 4px; font-size: 14px; color: var(--text-dim); font-weight: 500; }

  .tagline {
    margin-top: 14px;
    font-size: 15px;
    line-height: 1.55;
    color: #d6d6df;
    text-align: center;
    max-width: 360px;
  }

  /* -------- Buttons -------- */
  .links {
    width: 100%;
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 18px 20px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .link:hover {
    transform: translateY(-2px);
    background: var(--card-hover);
    border-color: var(--border-hover);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
  }
  .link:active { transform: translateY(0); }

  .link .ic {
    flex: 0 0 44px;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.06);
  }
  .link .ic svg { width: 22px; height: 22px; }
  .link .txt { display: flex; flex-direction: column; line-height: 1.25; }
  .link .txt small { font-size: 12px; font-weight: 500; color: var(--text-dim); margin-top: 2px; }
  .link .arrow { margin-left: auto; color: var(--text-dim); transition: transform 0.18s ease; }
  .link:hover .arrow { transform: translateX(3px); color: var(--text); }

  /* Accent variants */
  .link.primary {
    background: linear-gradient(135deg, rgba(124, 92, 255, 0.22), rgba(0, 212, 255, 0.14));
    border-color: rgba(124, 92, 255, 0.45);
  }
  .link.primary .ic { background: rgba(255, 255, 255, 0.12); }

  /* -------- Socials -------- */
  .socials {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
  }
  .socials a {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: var(--accent-2);
    border: 1px solid rgba(0, 212, 255, 0.28);
    transition: color 0.18s ease, border-color 0.18s ease, transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  }
  .socials a:hover {
    color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(124, 92, 255, 0.4);
  }
  .socials svg { width: 20px; height: 20px; }

  /* -------- Newsletter -------- */

  .nl-label {
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-2);

  .nl-card {

    background: var(--card);

  .nl-card img { width: 100%; border-radius: 14px; display: block; }

    letter-spacing: 0.3px;
  }
  .footer a { color: var(--text-dim); text-decoration: none; }
  .footer a:hover { color: var(--text); }
</style>
